name: Export

on:
  pull_request:
    paths:
      - ".github/workflows/export.yml"
      - "recipes/**"
      - "export_all.sh"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/export.yml"
      - "recipes/**"
      - "export_all.sh"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CONAN_REMOTE_NAME: xrplf
  CONAN_REMOTE_URL: https://conan.ripplex.io

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Conan
        uses: conan-io/setup-conan@2f4bd34e8e0af00e1a77a66e1d284e06d71d703f # v1.3.0

      - name: Export the recipes
        run: |
          ./export_all.sh

      - name: Add Conan remote
        run: |
          conan remote add --index 0 ${CONAN_REMOTE_NAME} ${CONAN_REMOTE_URL}

      - name: Upload the recipes (dry run)
        run: |
          conan upload '*' --confirm --check --only-recipe --remote ${CONAN_REMOTE_NAME} --dry-run

      - name: Log into Conan remote
        if: ${{ github.repository_owner == 'XRPLF' && github.event_name == 'push' }}
        run: |
          conan remote login ${CONAN_REMOTE_NAME} ${{ secrets.CONAN_REMOTE_USERNAME }} --password "${{ secrets.CONAN_REMOTE_PASSWORD }}"
          conan remote list-users
      - name: Upload the recipes
        if: ${{ github.repository_owner == 'XRPLF' && github.event_name == 'push' }}
        run: |
          conan upload '*' --confirm --check --only-recipe --remote ${CONAN_REMOTE_NAME}
