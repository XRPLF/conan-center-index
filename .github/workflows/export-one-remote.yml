name: Export one remote

on:
  workflow_call:
    inputs:
      CONAN_REMOTE_URL:
        required: true
        type: string
    secrets:
      CONAN_LOGIN_USERNAME_XRPLF:
        required: true
      CONAN_PASSWORD_XRPLF:
        required: true

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      CONAN_REMOTE_NAME: xrplf

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Conan
        uses: conan-io/setup-conan@2f4bd34e8e0af00e1a77a66e1d284e06d71d703f # v1.3.0

      - name: Export the recipes
        run: |
          ./export_all.sh

      - name: Add Conan remote
        env:
          CONAN_REMOTE_URL: ${{ inputs.CONAN_REMOTE_URL }}
        run: |
          conan remote add --index 0 "${CONAN_REMOTE_NAME}" "${CONAN_REMOTE_URL}"

      - name: Upload the recipes (dry run)
        run: |
          conan upload '*' --confirm --check --only-recipe --remote "${CONAN_REMOTE_NAME}" --dry-run

      - name: Log into Conan remote
        if: ${{ github.repository_owner == 'XRPLF' && github.event_name != 'pull_request' }}
        env:
          CONAN_LOGIN_USERNAME_XRPLF: ${{ secrets.CONAN_LOGIN_USERNAME_XRPLF }}
          CONAN_PASSWORD_XRPLF: ${{ secrets.CONAN_PASSWORD_XRPLF }}
        run: |
          conan remote login "${CONAN_REMOTE_NAME}" "${CONAN_LOGIN_USERNAME_XRPLF}" --password "${CONAN_PASSWORD_XRPLF}"
          conan remote list-users
      - name: Upload the recipes
        if: ${{ github.repository_owner == 'XRPLF' && github.event_name != 'pull_request' }}
        env:
          CONAN_LOGIN_USERNAME_XRPLF: ${{ secrets.CONAN_LOGIN_USERNAME_XRPLF }}
          CONAN_PASSWORD_XRPLF: ${{ secrets.CONAN_PASSWORD_XRPLF }}
        run: |
          conan upload '*' --confirm --check --only-recipe --remote "${CONAN_REMOTE_NAME}"
